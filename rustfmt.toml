# Maximum width of a line; lines longer than this will be wrapped.
max_width = 120

# Whether to use hard tabs instead of spaces.
hard_tabs = false

# Number of spaces per tab (only relevant when hard_tabs = false).
tab_spaces = 2

# How aggressively rustfmt should reflow code. Valid options are:
#   "Off"     – don't run small-code heuristics
#   "Default" – the normal behavior
#   "Max"     – apply heuristics as aggressively as possible
use_small_heuristics = "Max"

# Reorder `use` imports alphabetically and group them.
reorder_imports = true

# Edition of Rust the project is using. Ensures formatting rules match.
edition = "2021"

#-----------------------------------------------------------------------------------------------------------------------
# Unstable features
#-----------------------------------------------------------------------------------------------------------------------

# Enable/disable unstable features
# unstable_features = true

# Brace style
# brace_style = "AlwaysNextLine"
# control_brace_style = "AlwaysNextLine"

# Wrap long comments.
# wrap_comments = true     

# Width to wrap comments
# comment_width = 120      

# Format code blocks within doc comments.
# format_code_in_doc_comments = true

